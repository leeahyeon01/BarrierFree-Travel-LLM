<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>트래블리 - 무장애 여행</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 999px; background: #f0f0f0; font-size: 13px; cursor: pointer; }
    .chip:hover { background: #e0e0e0; }
    .banner-track { display: flex; transition: transform 0.35s ease; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

/* ── 데이터 ────────────────────────────────────────────────── */
const CATEGORIES = [
  { emoji: "🏛️", label: "관광지" },
  { emoji: "🏨", label: "프리미엄호텔" },
  { emoji: "🛏️", label: "숙박" },
  { emoji: "⚡", label: "플래시 특가" },
  { emoji: "🍽️", label: "식사" },
  { emoji: "🐾", label: "애견동반" },
  { emoji: "👶", label: "키즈 호텔" },
  { emoji: "🛁", label: "호캉스패키지" },
];

const REGIONS = {
  서울: ["강남/역삼/삼성", "신사/청담/압구정", "서초/교대/사당", "잠실/송파/강동", "을지로/명동/중구/동대문", "서울역/이태원/용산", "종로/인사동", "홍대/합정/마포/서대문", "여의도", "영등포역", "구로/신도림/금천", "김포공항/염창/강서", "건대입구/성수/왕십리", "성북/강북/노원/도봉"],
  부산: ["해운대/센텀", "광안리/수영", "서면/부산진", "남포동/중구", "기장/정관", "사하/하단", "동래/온천장"],
  제주: ["제주시내", "서귀포/중문", "함덕/조천", "성산/우도", "한림/협재", "모슬포/대정"],
  경기: ["수원", "성남/분당", "고양/일산", "용인", "안양/과천", "평택/안성", "광주/하남"],
  인천: ["인천공항", "송도/연수", "부평/계산", "강화도"],
  강원: ["강릉/속초", "춘천", "평창/횡성", "동해/삼척", "양양/고성"],
  경상: ["경주", "안동", "통영/거제", "진주", "대구 도심", "포항"],
  전라: ["전주", "여수", "순천", "광주 도심", "남원"],
  충청: ["대전 도심", "천안/아산", "청주", "공주/부여", "태안/서산"],
};

const RECENT = ["부산 전체"];

/* ── 지역 선택 모달 ────────────────────────────────────────── */
function RegionModal({ onClose, onSelect }) {
  const [activeRegion, setActiveRegion] = useState("서울");
  const regionKeys = Object.keys(REGIONS);

  return (
    <div className="fixed inset-0 bg-white z-50 flex flex-col">
      {/* 헤더 */}
      <div className="flex items-center gap-3 px-4 py-4 border-b border-gray-200">
        <button onClick={onClose} className="text-gray-500 hover:text-gray-800 text-xl font-light">✕</button>
        <span className="text-lg font-semibold">지역 선택</span>
      </div>

      {/* 본문 */}
      <div className="flex flex-1 overflow-hidden">
        {/* 왼쪽 대분류 사이드바 */}
        <div className="w-24 bg-gray-50 border-r border-gray-100 overflow-y-auto hide-scrollbar flex-shrink-0">
          {regionKeys.map((r) => (
            <button
              key={r}
              onClick={() => setActiveRegion(r)}
              className={`w-full text-center py-4 text-sm font-medium transition-colors ${
                activeRegion === r
                  ? "bg-white text-gray-900 font-bold border-r-2 border-blue-500"
                  : "text-gray-400 hover:text-gray-700"
              }`}
            >
              {r}
            </button>
          ))}
        </div>

        {/* 오른쪽 세부 지역 */}
        <div className="flex-1 overflow-y-auto hide-scrollbar">
          {/* 전체 버튼 */}
          <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
            <span className="text-base font-semibold text-gray-800">{activeRegion}</span>
            <button
              onClick={() => { onSelect(`${activeRegion} 전체`); onClose(); }}
              className="text-sm text-blue-500 font-medium flex items-center gap-1 hover:text-blue-700"
            >
              전체 &gt;
            </button>
          </div>

          {/* 세부 지역 리스트 */}
          {REGIONS[activeRegion].map((sub) => (
            <button
              key={sub}
              onClick={() => { onSelect(sub); onClose(); }}
              className="w-full text-left px-5 py-3.5 text-sm text-gray-600 hover:bg-gray-50 hover:text-blue-500 transition-colors border-b border-gray-50"
            >
              {sub}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── 배너 슬라이더 ──────────────────────────────────────────── */
const BANNERS = [
  { label: "Gold Class", text: "무장애 축제 포스터", bg: "from-gray-800 to-gray-600" },
  { label: "Special",    text: "무장애 축제 포스터", bg: "from-green-300 to-green-100" },
  { label: "Gold Class", text: "무장애 여행 가이드", bg: "from-blue-800 to-blue-600" },
];

function BannerSlider() {
  const [idx, setIdx] = useState(0);
  const prev = () => setIdx((i) => Math.max(i - 1, 0));
  const next = () => setIdx((i) => Math.min(i + 1, BANNERS.length - 2));

  return (
    <div className="relative overflow-hidden">
      <div
        className="flex gap-3 transition-transform duration-300 ease-in-out"
        style={{ transform: `translateX(calc(${-idx} * (50% + 6px)))` }}
      >
        {BANNERS.map((b, i) => (
          <div
            key={i}
            className={`flex-shrink-0 w-[calc(50%-6px)] rounded-2xl bg-gradient-to-br ${b.bg} overflow-hidden relative`}
            style={{ aspectRatio: "3/2" }}
          >
            <span className="absolute top-3 left-3 text-xs font-bold text-white bg-black/30 px-2 py-0.5 rounded">
              {b.label}
            </span>
            <div className="absolute inset-0 flex items-end p-4">
              <span className="text-white font-bold text-base leading-snug drop-shadow">{b.text}</span>
            </div>
          </div>
        ))}
      </div>

      {/* 화살표 */}
      {idx > 0 && (
        <button
          onClick={prev}
          className="absolute left-1 top-1/2 -translate-y-1/2 w-8 h-8 bg-white/90 rounded-full shadow flex items-center justify-center text-gray-600 hover:bg-white z-10"
        >
          ‹
        </button>
      )}
      {idx < BANNERS.length - 2 && (
        <button
          onClick={next}
          className="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 bg-white/90 rounded-full shadow flex items-center justify-center text-gray-600 hover:bg-white z-10"
        >
          ›
        </button>
      )}
    </div>
  );
}

/* ── 메인 홈 ────────────────────────────────────────────────── */
function Home() {
  const [modalOpen, setModalOpen] = useState(false);
  const [recents, setRecents] = useState(RECENT);
  const [selectedCategory, setSelectedCategory] = useState(null);

  const handleSelect = (region) => {
    setRecents((prev) =>
      prev.includes(region) ? prev : [region, ...prev].slice(0, 5)
    );
  };

  const removeRecent = (r) => setRecents((prev) => prev.filter((x) => x !== r));

  return (
    <div className="max-w-md mx-auto bg-white min-h-screen">
      {/* 상단 여백 */}
      <div className="px-4 pt-8 pb-4">
        {/* 제목 */}
        <h1 className="text-center text-lg font-bold text-gray-800 mb-4">어디로 갈까요?</h1>

        {/* 검색바 + 내주변 */}
        <div className="flex gap-2">
          <button
            onClick={() => setModalOpen(true)}
            className="flex-1 flex items-center justify-between gap-2 bg-white border border-gray-300 rounded-xl px-4 py-3 text-gray-500 text-sm shadow-sm hover:border-blue-400 transition-colors"
          >
            <div className="flex items-center gap-2">
              <span className="text-blue-500 text-base">📍</span>
              <span>지역선택</span>
            </div>
            <span className="text-gray-400 text-base">›</span>
          </button>

          <button className="flex flex-col items-center justify-center bg-white border border-gray-300 rounded-xl px-3 py-2 text-xs text-gray-600 shadow-sm hover:bg-gray-50 gap-0.5 min-w-[56px]">
            <span className="text-lg">✈️</span>
            <span>내주변</span>
          </button>
        </div>

        {/* 최근 선택 지역 */}
        {recents.length > 0 && (
          <div className="mt-4">
            <p className="text-xs text-gray-400 mb-2">최근 선택 지역</p>
            <div className="flex flex-wrap gap-2">
              {recents.map((r) => (
                <span key={r} className="chip text-gray-600">
                  {r}
                  <button
                    onClick={() => removeRecent(r)}
                    className="ml-1 text-gray-400 hover:text-gray-700 leading-none"
                  >
                    ×
                  </button>
                </span>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* 구분선 */}
      <div className="h-2 bg-gray-100" />

      {/* 카테고리 메뉴 */}
      <div className="px-4 py-5">
        <div className="grid grid-cols-4 gap-y-5 gap-x-2">
          {CATEGORIES.map((c) => (
            <button
              key={c.label}
              onClick={() => setSelectedCategory(c.label)}
              className={`flex flex-col items-center gap-1.5 group`}
            >
              <div
                className={`w-16 h-16 rounded-full flex items-center justify-center text-2xl shadow-sm transition-all
                  ${selectedCategory === c.label
                    ? "ring-2 ring-blue-400 bg-blue-50 scale-105"
                    : "bg-gray-100 group-hover:bg-gray-200"
                  }`}
              >
                {c.emoji}
              </div>
              <span
                className={`text-xs text-center leading-tight ${
                  selectedCategory === c.label ? "font-bold text-blue-600" : "text-gray-600"
                }`}
              >
                {c.label}
              </span>
            </button>
          ))}
        </div>
      </div>

      {/* 구분선 */}
      <div className="h-2 bg-gray-100" />

      {/* 배너 슬라이더 */}
      <div className="px-4 py-5">
        <BannerSlider />
      </div>

      {/* 지역 선택 모달 */}
      {modalOpen && (
        <RegionModal
          onClose={() => setModalOpen(false)}
          onSelect={handleSelect}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Home />);
</script>
</body>
</html>
